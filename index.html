<!DOCTYPE html>
<html>
<head>
    <title>Cricket Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('DSEG7.ttf') format('truetype'); 
        }
        body { 
            background: black; 
            margin: 0; 
            padding: 0;
            font-family: Arial, sans-serif; 
            color: white; 
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #board {
            /* Increased base width and applied 1.1 scale for 10% boost */
            width: 1050px; 
            padding-top: 60px; 
            transform: scale(1.1);
            transform-origin: top center;
        }

        .row-container { 
            width: 100%; 
            margin-bottom: 8px; /* Slightly tighter to handle the 10% zoom height */
        }

        .top-row-grid { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .digit-row { 
            display: flex;
            width: 100%;
            justify-content: space-between;
        }

        .group-wrap {
            display: flex;
            justify-content: center;
            width: 32%;
        }

        .cell, .top-digit-wrap, .clock-colon-wrap { 
            position: relative; 
            display: inline-block;
            width: 55px;   
            height: 70px;  
            margin: 0 3px;
        }
        
        .top-digit-wrap { width: 35px; height: 40px; }
        .clock-colon-wrap { width: 20px; height: 40px; }

        .digit, .digit-bg { 
            font-family: 'DSEG7'; 
            position: absolute; 
            left: 0; 
            width: 100%; 
            text-align: center;
        }
        
        .digit { color: #f00; z-index: 2; font-size: 70px; line-height: 70px; text-shadow: 0 0 8px rgba(255,0,0,0.7); }
        .digit-bg { color: #010808; z-index: 1; font-size: 70px; line-height: 70px; }
        
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 40px; line-height: 40px; }
        .clock-colon-wrap .digit { font-size: 35px; line-height: 40px; top: -3px; }

        .label-row { 
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 2px;
        }
        .label { 
            text-transform: uppercase; 
            font-size: 29px; 
            font-weight: bold; 
            color: #ccc; 
            width: 32%;
            text-align: center;
        }
        .label.inactive { color: #0a0a0a; }

        /* Media queries to handle the scale on smaller screens */
        @media (max-width: 1100px) {
            #board { transform: scale(0.9); }
        }
        @media (max-width: 600px) {
            #board { transform: scale(0.7); padding-top: 80px; }
            body { overflow: visible; }
        }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],
            [["Extras", 7],   ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10],["Last Man", 8],["Overs Rem", 12]],
            [["To Win", 11],  ["Last Wkt", 9],["DLS Par", 13]]
        ];

        function createDigit(char, isColon, isSmall) {
            var wrap = document.createElement('div');
            wrap.className = isColon ? 'clock-colon-wrap' : (isSmall ? 'top-digit-wrap' : 'cell');
            var bg = document.createElement('div');
            bg.className = 'digit-bg';
            bg.innerHTML = isColon ? ':' : '8';
            var fg = document.createElement('div');
            fg.className = 'digit';
            fg.innerHTML = char;
            wrap.appendChild(bg);
            wrap.appendChild(fg);
            return wrap;
        }

        var board = document.getElementById('board');
        var html = '<div class="row-container"><div id="row0" class="top-row-grid"></div></div>';
        for (var i = 0; i < ROWS.length; i++) {
            var rNum = i + 1;
            html += '<div class="row-container">' +
                        '<div class="label-row">' +
                            '<div id="lbl-' + rNum + '-0" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-1" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-2" class="label"></div>' +
                        '</div>' +
                        '<div id="row' + rNum + '" class="digit-row"></div>' +
                    '</div>';
        }
        board.innerHTML = html;

        function updateScore() {
            fetch('https://api.npoint.io/' + NPOINT_ID + '?t=' + Date.now())
                .then(function(res) { return res.json(); })
                .then(function(vals) {
                    if (!vals) return;

                    var r0 = document.getElementById('row0');
                    r0.innerHTML = '';
                    var b1 = (vals[0] || "").toString().padStart(2, " ").split('');
                    var b2 = (vals[1] || "").toString().padStart(2, " ").split('');
                    var now = new Date();
                    var timeStr = (now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0')).split('');

                    var group = function(arr) {
                        var d = document.createElement('div');
                        for(var k=0; k<arr.length; k++) d.appendChild(createDigit(arr[k], arr[k]===':', true));
                        return d;
                    };

                    r0.appendChild(group(b1));
                    r0.appendChild(group(timeStr));
                    r0.appendChild(group(b2));

                    for (var r = 0; r < ROWS.length; r++) {
                        var container = document.getElementById('row' + (r + 1));
                        container.innerHTML = '';
                        var rowData = ROWS[r];

                        for (var c = 0; c < rowData.length; c++) {
                            var gWrap = document.createElement('div');
                            gWrap.className = 'group-wrap';
                            var labelText = rowData[c][0];
                            var value = vals[rowData[c][1]];
                            var lbl = document.getElementById('lbl-' + (r+1) + '-' + c);
                            lbl.innerHTML = labelText;
                            var isActive = (value !== null && value !== undefined && value.toString().trim() !== "");
                            lbl.className = isActive ? 'label' : 'label inactive';
                            var chars = (value === null || value === undefined ? "" : value).toString().slice(-3).padStart(3, " ").split('');
                            for (var m = 0; m < chars.length; m++) {
                                gWrap.appendChild(createDigit(chars[m]));
                            }
                            container.appendChild(gWrap);
                        }
                    }
                })
                .catch(function(err) { console.error(err); });
        }

        setInterval(updateScore, 3000);
        updateScore();
    </script>
</body>
</html>

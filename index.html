        body { background: #000; margin: 0; padding: 0; font-family: Arial, sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        #board { width: 94vw; max-height: 90vh; display: block; } /* Narrowed slightly for overscan safety */
        .row-container { width: 100%; margin-bottom: 1.5vh; } 
        .top-row-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 2vh; }
        .digit-row { display: flex; width: 100%; justify-content: space-between; }
        .group-wrap { display: flex; justify-content: center; width: 32%; }
        .top-row-grid .group-wrap { width: auto; flex: 1; }
        .cell, .top-digit-wrap, .clock-colon-wrap { position: relative; display: inline-block; width: 6vw; max-width: 65px; height: 9vh; margin: 0 0.5vw; vertical-align: top; }
        .top-digit-wrap { width: 4vw; max-width: 40px; height: 6vh; }
        .clock-colon-wrap { width: 2vw; max-width: 20px; height: 6vh; margin: 0 0.2vw; }
        .digit, .digit-bg { font-family: 'DSEG7'; position: absolute; left: 0; width: 100%; text-align: center; }
        .digit { color: #ffae00; z-index: 2; font-size: 9vh; line-height: 9vh; text-shadow: 0 0 5px rgba(255, 174, 0, 0.5); }
        .digit-bg { color: #0d0d0d; z-index: 1; font-size: 9vh; line-height: 9vh; }
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 6vh; line-height: 6vh; }
        .clock-colon-wrap .digit { font-size: 5.5vh; line-height: 6vh; top: -0.5vh; }

        @keyframes blinker { 50% { opacity: 0; } }
        .blink { animation: blinker 1s infinite step-start; -webkit-animation: blinker 1s infinite step-start; }
    
        .label-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.2vh; }
        .label { font-size: 4.5vh; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2vw; color: #CCC; width: 33%; text-align: center; white-space: nowrap; }
        .label.inactive { color: #111; }

        #status-dot { 
            display: inline-block; width: 0.8vh; height: 0.8vh; max-width: 8px; max-height: 8px; min-width: 4px; min-height: 4px;
            background-color: #0f0; border-radius: 50%; margin-right: 0.8vh; opacity: 0; vertical-align: middle;
            box-shadow: 0 0 3px rgba(0, 255, 0, 0.5); transition: opacity 0.3s;
        }
        .dot-local { background-color: #0f0 !important; }
        .dot-cloud { background-color: #ffae00 !important; }
        .dot-error { background-color: #f00 !important; }
        .dot-active { opacity: 1 !important; }

        #fs-btn { position: fixed; bottom: 15px; right: 15px; width: 35px; height: 35px; background: #1a1a1a; color: #555; border: 1px solid #333; z-index: 1000; cursor: pointer; border-radius: 4px; opacity: 0.8; }
        #last-update { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: #333; font-size: 1.5vh; text-transform: uppercase; }

        @media (max-width: 600px) {
            .label { font-size: 14px !important; }
            .digit, .digit-bg { font-size: 30px !important; line-height: 32px !important; }
            .cell { height: 32px !important; width: 22px !important; }
        }
    </style>
</head>
<body>
    <button id="fs-btn">⛶</button>
    <div id="board"></div>
    <div id="last-update">CONNECTING...</div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var LOCAL_URL = "http://192.168.137.1/"; 
        var NPOINT_URL = 'https://api.npoint.io/' + NPOINT_ID;
        var LOCAL_SPEED = 1000;
        var CLOUD_SPEED = 5000;
        var currentInterval = LOCAL_SPEED;
        var isUsingLocal = true;
        var pollTimer = null;
        
        // Single XHR object to save memory on Smart TVs
        var x = new XMLHttpRequest();

        var ROWS = [
            [["Batter", 2], ["Total", 4], ["Batter", 3]],
            [["Extras", 7], ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10], ["Last Man", 8], ["Overs Rem", 12]],
            [["To Win", 11], ["Last Wkt", 9], ["DLS Par", 13]]
        ];

        // Polyfill for 1st Gen Chromecast
        if (!String.prototype.padStart) {
            String.prototype.padStart = function(t, p) {
                t = t >> 0; p = String(p || ' ');
                if (this.length > t) return String(this);
                t = t - this.length;
                if (t > p.length) p += p.repeat(t / p.length);
                return p.slice(0, t) + String(this);
            };
        }

        var refs = { time: [], b1: [], b2: [], rows: [] };

        function cDig(p, isC, isS) {
            var w = document.createElement('div');
            w.className = isC ? 'clock-colon-wrap' : (isS ? 'top-digit-wrap' : 'cell');
            w.innerHTML = '<div class="digit-bg">'+(isC?':':'8')+'</div><div class="digit'+(isC?' blink':'')+'">'+(isC?':':'')+'</div>';
            p.appendChild(w);
            return w.querySelector('.digit');
        }

        function initUI() {
            var board = document.getElementById('board');
            board.innerHTML = '';
            var r0 = document.createElement('div'); r0.className = 'top-row-grid';
            var g1 = document.createElement('div'); g1.className = 'group-wrap';
            refs.b1 = [cDig(g1,0,1), cDig(g1,0,1)];
            var gT = document.createElement('div'); gT.className = 'group-wrap';
            refs.time = [cDig(gT,0,1), cDig(gT,0,1), cDig(gT,1,1), cDig(gT,0,1), cDig(gT,0,1)];
            var g2 = document.createElement('div'); g2.className = 'group-wrap';
            refs.b2 = [cDig(g2,0,1), cDig(g2,0,1)];
            r0.appendChild(g1); r0.appendChild(gT); r0.appendChild(g2);
            board.appendChild(r0);

            for (var r=0; r<4; r++) {
                var cont = document.createElement('div'); cont.className = 'row-container';
                var lRow = document.createElement('div'); lRow.className = 'label-row';
                var dRow = document.createElement('div'); dRow.className = 'digit-row';
                refs.rows[r] = [];
                for (var c=0; c<3; c++) {
                    var lbl = document.createElement('div');
                    lbl.className = 'label inactive'; lbl.id = 'l-'+r+'-'+c;
                    lbl.innerHTML = (ROWS[r][c][0] === "Wickets") ? '<span id="status-dot"></span>Wickets' : ROWS[r][c][0];
                    lRow.appendChild(lbl);
                    var g = document.createElement('div'); g.className = 'group-wrap';
                    refs.rows[r][c] = [cDig(g,0,0), cDig(g,0,0), cDig(g,0,0)];
                    dRow.appendChild(g);
                }
                cont.appendChild(lRow); cont.appendChild(dRow);
                board.appendChild(cont);
            }
        }

        function tickClock() {
            var d = new Date();
            var h = d.getHours().toString().padStart(2,'0');
            var m = d.getMinutes().toString().padStart(2,'0');
            var s = h + ":" + m;
            if (refs.time.length === 5) {
                for(var i=0; i<5; i++) if(i !== 2) refs.time[i].textContent = s[i];
            }
        }

        function render(vals) {
            tickClock();
            var b1 = (vals[0]||"").toString().padStart(2,' ');
            var b2 = (vals[1]||"").toString().padStart(2,' ');
            for(var i=0; i<2; i++) { 
                if(refs.b1[i]) refs.b1[i].textContent = b1[i]; 
                if(refs.b2[i]) refs.b2[i].textContent = b2[i]; 
            }
            for(var r=0; r<4; r++) {
                for(var c=0; c<3; c++) {
                    var v = (vals[ROWS[r][c][1]]||"").toString().slice(-3).padStart(3,' ');
                    var lEl = document.getElementById('l-'+r+'-'+c);
                    if(lEl) lEl.className = v.trim()==="" ? 'label inactive' : 'label';
                    for(var j=0; j<3; j++) {
                        if(refs.rows[r][c][j]) refs.rows[r][c][j].textContent = v[j];
                    }
                }
            }
            document.getElementById('last-update').textContent = "UPDATED: " + new Date().toLocaleTimeString();
        }

        function poll() {
            // Cache-busting is handled by the "?t=" at the end of the URL
            var url = (isUsingLocal ? LOCAL_URL : NPOINT_URL) + "?t=" + Date.now();
            
            x.abort(); 
            x.open('GET', url, true);
            x.timeout = 2500;
        
            x.onreadystatechange = function () {
                if (x.readyState === 4) {
                    if (x.status === 200) {
                        try { 
                            render(JSON.parse(x.responseText)); 
                            flash(isUsingLocal ? 'local' : 'cloud'); 
                        } catch (e) { flash('error'); }
                    } else if (isUsingLocal) {
                        // If local fails (status 0 or 404), flip to cloud
                        console.log("Local fail, switching to cloud...");
                        isUsingLocal = false; 
                        currentInterval = CLOUD_SPEED;
                    }
                    
                    // Re-schedule next poll
                    clearTimeout(pollTimer);
                    pollTimer = setTimeout(poll, currentInterval);
                }
            };
        
            x.onerror = function() { 
                if(isUsingLocal) { 
                    isUsingLocal = false; 
                    currentInterval = CLOUD_SPEED; 
                    clearTimeout(pollTimer);
                    pollTimer = setTimeout(poll, currentInterval);
                }
            };
            
            x.send(); // No custom headers here = No Preflight issues!
        }
        
        function flash(t) {
            var dot = document.getElementById('status-dot');
            if (!dot) return;
            dot.className = 'dot-' + t + ' dot-active';
            setTimeout(function() { dot.classList.remove('dot-active'); }, 500);
        }

        // Auto-hide fullscreen button
        function initFsLogic() {
            var btn = document.getElementById('fs-btn');
            btn.onclick = function() {
                var e = document.documentElement;
                var rfs = e.requestFullscreen || e.webkitRequestFullScreen || e.mozRequestFullScreen || e.msRequestFullscreen;
                if(rfs) rfs.call(e);
                this.style.display = 'none';
            };
            setTimeout(function() {
                btn.style.transition = 'opacity 1s';
                btn.style.opacity = '0';
                setTimeout(function() { if(btn.style.opacity === '0') btn.style.display = 'none'; }, 1000);
            }, 10000);
        }

        initUI();
        initFsLogic();
        setInterval(tickClock, 1000);
        poll();
    </script>
</body>
</html>

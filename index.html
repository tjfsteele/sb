<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('DSEG7.ttf') format('truetype'); 
        }
        
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            color: white; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
    
        #board { 
            width: 98vw; 
            max-height: 96vh; 
            display: block;
        }
        
        #status-dot { 
            display: inline-block; 
            width: 1.8vh; 
            height: 1.8vh; 
            background-color: #0f0; 
            border-radius: 50%; 
            margin-right: 1vh; 
            vertical-align: middle; 
            opacity: 0; 
            transition: opacity 0.1s; 
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.8); 
        }
        .dot-local { background-color: #0f0 !important; box-shadow: 0 0 8px rgba(0, 255, 0, 0.8) !important; }
        .dot-cloud { background-color: #ffae00 !important; box-shadow: 0 0 8px rgba(255, 174, 0, 0.8) !important; }
        .dot-error { background-color: #f00 !important; box-shadow: 0 0 8px rgba(255, 0, 0, 0.8) !important; }
        .dot-active { opacity: 1 !important; }
        
        #fs-btn { 
            position: fixed; bottom: 15px; right: 15px; width: 35px; height: 35px; 
            background: #1a1a1a; color: #555; border: 1px solid #333; 
            z-index: 1000; font-size: 16px; cursor: pointer; border-radius: 4px; 
            opacity: 0.6;
        }
        
        .row-container { width: 100%; margin-bottom: 1.5vh; } 
        .top-row-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 1.5vh; }
        .digit-row { display: flex; width: 100%; justify-content: space-between; }
        .group-wrap { display: flex; justify-content: center; width: 32%; }
        
        .cell, .top-digit-wrap, .clock-colon-wrap { 
            position: relative; 
            display: inline-block; 
            width: 6vw; 
            max-width: 65px;
            height: 9vh; 
            margin: 0 0.5vw; 
        }
        
        .top-digit-wrap { width: 4vw; max-width: 40px; height: 6vh; }
        .clock-colon-wrap { width: 2vw; max-width: 25px; height: 6vh; }
    
        .digit, .digit-bg { 
            font-family: 'DSEG7'; 
            position: absolute; 
            left: 0; 
            width: 100%; 
            text-align: center; 
        }
    
        .digit { 
            color: #A3C1AD; /* #ffae00; */
            z-index: 2; 
            font-size: 9vh; 
            line-height: 9vh; 
            /* text-shadow: 0 0 10px rgba(255, 100, 0, 0.5); 
            filter: brightness(1.1); */
        }
    
        .digit-bg { color: #0a0800; z-index: 1; font-size: 9vh; line-height: 9vh; }
    
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 6vh; line-height: 6vh; }
        .clock-colon-wrap .digit { font-size: 5.5vh; line-height: 6vh; top: -0.5vh; }
    
        .label-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.2vh; }
        .label { 
            font-size: 5vh; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            color: #CCC;
            width: 33%;
            text-align: center;
            display: block;
            white-space: nowrap;
        }
        .label.inactive { color: #111; }
        
        /* Mobile Specific Overrides */
        @media (max-width: 600px) {
            #board { width: 100vw; }
            /* Force the top row to stay within screen bounds */
            .top-row-grid { width: 95vw; margin: 0 auto 10px auto; }
            .label { font-size: 16px !important; letter-spacing: 0.5px !important; }
            .digit, .digit-bg { font-size: 32px !important; line-height: 32px !important; }
            .cell { height: 32px !important; width: 22px !important; margin: 0 1px !important; }
            .top-digit-wrap { height: 22px !important; width: 15px !important; margin: 0 1px !important; }
            .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 20px !important; line-height: 22px !important; }
            .clock-colon-wrap { width: 8px !important; }
            .clock-colon-wrap .digit { font-size: 18px !important; line-height: 22px !important; }
        }
    </style>
</head>
<body>
    <button id="fs-btn">⛶</button>
    <div id="board"></div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var LOCAL_URL = "http://192.168.137.1/"; // Adjust path if necessary (e.g., /status or /score)
        var NPOINT_URL = 'https://api.npoint.io/' + NPOINT_ID;
        
        var FAST_SPEED = 5000;
        var SLOW_SPEED = 30000;
        var IDLE_TIME = 5 * 60 * 1000; 
        
        var lastDataHash = "";
        var lastChangeTimestamp = Date.now();
        var currentInterval = FAST_SPEED;
        var pollTimer = null;

        var ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],
            [["Extras", 7],   ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10],["Last Man", 8],["Overs Rem", 12]],
            [["To Win", 11],  ["Last Wkt", 9],["DLS Par", 13]]
        ];

        // ES5 Polyfill for padStart
        if (!String.prototype.padStart) {
            String.prototype.padStart = function padStart(targetLength, padString) {
                targetLength = targetLength >> 0;
                padString = String(typeof padString !== 'undefined' ? padString : ' ');
                if (this.length > targetLength) { return String(this); }
                else {
                    targetLength = targetLength - this.length;
                    if (targetLength > padString.length) {
                        padString += padString.repeat(targetLength / padString.length);
                    }
                    return padString.slice(0, targetLength) + String(this);
                }
            };
        }
        function flashStatus(type) {
            var dot = document.getElementById('status-dot');
            if (!dot) return;
    
            // Clear previous classes
            dot.className = ''; 
            
            // Apply color based on source
            if (type === 'local') {
                dot.classList.add('dot-local');
            } else if (type === 'cloud') {
                dot.classList.add('dot-cloud');
            } else if (type === 'error') {
                dot.classList.add('dot-error');
            }
    
            // Trigger visible flash
            dot.classList.add('dot-active');
            setTimeout(function() {
                dot.classList.remove('dot-active');
            }, 500);
        }
        function createDigit(char, isColon, isSmall) {
            var wrap = document.createElement('div');
            wrap.className = isColon ? 'clock-colon-wrap' : (isSmall ? 'top-digit-wrap' : 'cell');
            var bg = document.createElement('div'); bg.className = 'digit-bg'; bg.innerHTML = isColon ? ':' : '8';
            var fg = document.createElement('div'); fg.className = 'digit'; fg.innerHTML = char;
            wrap.appendChild(bg); wrap.appendChild(fg);
            return wrap;
        }

        var board = document.getElementById('board');
        var boardHtml = '<div class="row-container"><div id="row0" class="top-row-grid"></div></div>';
        for (var i = 0; i < ROWS.length; i++) {
            boardHtml += '<div class="row-container"><div class="label-row"><div id="lbl-'+(i+1)+'-0" class="label"></div><div id="lbl-'+(i+1)+'-1" class="label"></div><div id="lbl-'+(i+1)+'-2" class="label"></div></div><div id="row'+(i+1)+'" class="digit-row"></div></div>';
        }
        board.innerHTML = boardHtml;

        function updateScore() {
            var xhrLocal = new XMLHttpRequest();
            // Use a short timeout so the board doesn't hang if local is down
            xhrLocal.open('GET', LOCAL_URL + '?t=' + Date.now(), true);
            xhrLocal.timeout = 2000; 
    
            xhrLocal.onreadystatechange = function () {
                if (xhrLocal.readyState === 4) {
                    if (xhrLocal.status === 200) {
                        processData(xhrLocal.responseText, 'local');
                    } else {
                        // Local failed, try nPoint
                        fetchNpoint();
                    }
                }
            };
    
            xhrLocal.ontimeout = function () { fetchNpoint(); };
            xhrLocal.onerror = function () { fetchNpoint(); };
            xhrLocal.send();
        }
    
        function fetchNpoint() {
            var xhrCloud = new XMLHttpRequest();
            xhrCloud.open('GET', 'https://api.npoint.io/' + NPOINT_ID + '?t=' + Date.now(), true);
            xhrCloud.onreadystatechange = function () {
                if (xhrCloud.readyState === 4) {
                    if (xhrCloud.status === 200) {
                        processData(xhrCloud.responseText, 'cloud');
                    } else {
                        flashStatus('error');
                        switchInterval(FAST_SPEED);
                    }
                }
            };
            xhrCloud.send();
        }
    
        function processData(responseText, source) {
            try {
                var vals = JSON.parse(responseText);
                var currentHash = JSON.stringify(vals);
    
                if (currentHash !== lastDataHash) {
                    lastDataHash = currentHash;
                    lastChangeTimestamp = Date.now();
                    switchInterval(FAST_SPEED);
                } else if (Date.now() - lastChangeTimestamp > IDLE_TIME) {
                    switchInterval(SLOW_SPEED);
                }
    
                renderBoard(vals);
                flashStatus(source);
            } catch (e) {
                if (source === 'local') {
                    fetchNpoint();
                } else {
                    flashStatus('error');
                }
            }
        }
        function makeGroup(s, small) {
            var d = document.createElement('div'); 
            d.style.display="flex";
            var chars = s.split('');
            for (var i = 0; i < chars.length; i++) {
                var c = chars[i];
                d.appendChild(createDigit(c, c===':', small));
            }
            return d;
        }

        function renderBoard(vals) {
            var r0 = document.getElementById('row0');
            r0.innerHTML = '';
            var b1 = (vals[0] || "").toString().padStart(2, ' ');
            var b2 = (vals[1] || "").toString().padStart(2, ' ');
            var now = new Date();
            var hours = now.getHours().toString().padStart(2, '0');
            var mins = now.getMinutes().toString().padStart(2, '0');
            var timeStr = hours + ":" + mins;

            r0.appendChild(makeGroup(b1, true));
            r0.appendChild(makeGroup(timeStr, true));
            r0.appendChild(makeGroup(b2, true));

            for (var r = 0; r < ROWS.length; r++) {
                var container = document.getElementById('row' + (r + 1));
                container.innerHTML = '';
                for (var c = 0; c < 3; c++) {
                    var gWrap = document.createElement('div'); gWrap.className = 'group-wrap';
                    var labelText = ROWS[r][c][0];
                    var val = vals[ROWS[r][c][1]];
                    var lbl = document.getElementById('lbl-' + (r+1) + '-' + c);

                    if (labelText === "Wickets") {
                        lbl.innerHTML = '<span id="status-dot"></span>' + labelText;
                    } else { lbl.innerHTML = labelText; }

                    var active = (val !== null && val !== undefined && val.toString().trim() !== "");
                    lbl.className = active ? 'label' : 'label inactive';
                    
                    var valStr = (val || "").toString().slice(-3).padStart(3, ' ');
                    var valChars = valStr.split('');
                    for (var j = 0; j < valChars.length; j++) {
                        gWrap.appendChild(createDigit(valChars[j]));
                    }
                    container.appendChild(gWrap);
                }
            }
        }

        function switchInterval(ms) {
            if (currentInterval !== ms) {
                currentInterval = ms;
                clearInterval(pollTimer);
                pollTimer = setInterval(updateScore, currentInterval);
            }
        }

        pollTimer = setInterval(updateScore, currentInterval);
        updateScore();

        document.getElementById('fs-btn').onclick = function() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if(rfs) rfs.call(el);
            this.style.display = 'none';
        };
    </script>
</body>
</html>

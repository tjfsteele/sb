<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard - Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('dseg7-modern-latin-700-normal.ttf') format('truetype'); 
            font-weight: 700;
            font-style: normal;
        }
        
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            color: white; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
    
        #board { 
            width: 98vw; 
            max-height: 96vh; 
            display: block;
        }
        
        #status-dot { 
            display: inline-block; 
            width: 1.8vh; 
            height: 1.8vh; 
            background-color: #0f0; 
            border-radius: 50%; 
            margin-right: 1vh; 
            vertical-align: middle; 
            opacity: 0; 
            transition: opacity 0.1s; 
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.8); 
        }
        .dot-local { background-color: #0f0 !important; box-shadow: 0 0 8px rgba(0, 255, 0, 0.8) !important; }
        .dot-cloud { background-color: #ffae00 !important; box-shadow: 0 0 8px rgba(255, 174, 0, 0.8) !important; }
        .dot-error { background-color: #f00 !important; box-shadow: 0 0 8px rgba(255, 0, 0, 0.8) !important; }
        .dot-active { opacity: 1 !important; }
        
        #fs-btn { 
            position: fixed; bottom: 15px; right: 15px; width: 35px; height: 35px; 
            background: #1a1a1a; color: #555; border: 1px solid #333; 
            z-index: 1000; font-size: 16px; cursor: pointer; border-radius: 4px; 
            opacity: 0.6;
        }
        
        .row-container { width: 100%; margin-bottom: 1.5vh; } 
        .top-row-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 1.5vh; }
        .digit-row { display: flex; width: 100%; justify-content: space-between; }
        .group-wrap { display: flex; justify-content: center; width: 32%; }
        
        .cell, .top-digit-wrap, .clock-colon-wrap { 
            position: relative; 
            display: inline-block; 
            width: 6vw; 
            max-width: 65px;
            height: 9vh; 
            margin: 0 0.5vw; 
        }
        
        .top-digit-wrap { width: 4vw; max-width: 40px; height: 6vh; }
        .clock-colon-wrap { width: 2vw; max-width: 25px; height: 6vh; }
    
        .digit, .digit-bg { 
            font-family: 'DSEG7'; 
            position: absolute; 
            left: 0; 
            width: 100%; 
            text-align: center; 
        }
    
        .digit { 
            color: #ffae00;
            z-index: 2; 
            font-size: 9vh; 
            line-height: 9vh; 
            will-change: transform, opacity;
            text-shadow: 0 0 5px rgba(255, 174, 0, 0.5), 0 0 2px rgba(255, 255, 255, 0.2);
        }
    
        .digit-bg { color: #0a0800; z-index: 1; font-size: 9vh; line-height: 9vh; }
    
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 6vh; line-height: 6vh; }
        .clock-colon-wrap .digit { font-size: 5.5vh; line-height: 6vh; top: -0.5vh; }

        /* GPU-Accelerated Blink for Chromecast v1 */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .blink { animation: blink 1s infinite; will-change: opacity; }
    
        .label-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.2vh; }
        .label { 
            font-size: 5vh; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            color: #CCC;
            width: 33%;
            text-align: center;
            display: block;
            white-space: nowrap;
        }
        .label.inactive { color: #111; }
        
        @media (max-width: 600px) {
            #board { width: 100vw; }
            .top-row-grid { width: 95vw; margin: 0 auto 10px auto; }
            .label { font-size: 16px !important; letter-spacing: 0.5px !important; }
            .digit, .digit-bg { font-size: 32px !important; line-height: 32px !important; }
            .cell { height: 32px !important; width: 22px !important; margin: 0 1px !important; }
            .top-digit-wrap { height: 22px !important; width: 15px !important; margin: 0 1px !important; }
            .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 20px !important; line-height: 22px !important; }
            .clock-colon-wrap { width: 8px !important; }
            .clock-colon-wrap .digit { font-size: 18px !important; line-height: 22px !important; }
        }
    </style>
</head>
<body>
    <button id="fs-btn">⛶</button>
    <div id="board"></div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var LOCAL_URL = "http://192.168.137.1/"; 
        var NPOINT_URL = 'https://api.npoint.io/' + NPOINT_ID;
        
        var LOCAL_SPEED = 1000;
        var CLOUD_SPEED = 5000;
        
        var pollTimer = null;
        var currentInterval = LOCAL_SPEED;
        var isUsingLocal = true;

        var ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],
            [["Extras", 7],   ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10],["Last Man", 8],["Overs Rem", 12]],
            [["To Win", 11],  ["Last Wkt", 9],["DLS Par", 13]]
        ];

        if (!String.prototype.padStart) {
            String.prototype.padStart = function(targetLength, padString) {
                targetLength = targetLength >> 0;
                padString = String(typeof padString !== 'undefined' ? padString : ' ');
                if (this.length > targetLength) return String(this);
                targetLength = targetLength - this.length;
                if (targetLength > padString.length) padString += padString.repeat(targetLength / padString.length);
                return padString.slice(0, targetLength) + String(this);
            };
        }

        function createDigitElement(isColon, isSmall, shouldBlink) {
            var wrap = document.createElement('div');
            wrap.className = isColon ? 'clock-colon-wrap' : (isSmall ? 'top-digit-wrap' : 'cell');
            var bg = document.createElement('div'); bg.className = 'digit-bg'; bg.innerHTML = isColon ? ':' : '8';
            var fg = document.createElement('div'); fg.className = 'digit'; 
            if (shouldBlink) fg.className += ' blink';
            // Store a flag on the element so we know it's a colon later
            if (isColon) wrap.dataset.isColon = "true";
            wrap.appendChild(bg); wrap.appendChild(fg);
            return wrap;
        }

        var board = document.getElementById('board');
        var boardHtml = '<div class="row-container"><div id="row0" class="top-row-grid"></div></div>';
        for (var i = 0; i < ROWS.length; i++) {
            boardHtml += '<div class="row-container"><div class="label-row"><div id="lbl-'+(i+1)+'-0" class="label"></div><div id="lbl-'+(i+1)+'-1" class="label"></div><div id="lbl-'+(i+1)+'-2" class="label"></div></div><div id="row'+(i+1)+'" class="digit-row"></div></div>';
        }
        board.innerHTML = boardHtml;

        var digitRefs = { top: [], rows: [] };
        
        var r0 = document.getElementById('row0');
        for(var i=0; i<7; i++) { 
            var isColon = (i === 3);
            var el = createDigitElement(isColon, true, isColon);
            r0.appendChild(el);
            digitRefs.top.push({
                dom: el.querySelector('.digit'),
                isColon: isColon
            });
        }

        for (var r = 0; r < ROWS.length; r++) {
            var rowEl = document.getElementById('row' + (r + 1));
            digitRefs.rows[r] = [];
            for (var c = 0; c < 3; c++) {
                var gWrap = document.createElement('div'); gWrap.className = 'group-wrap';
                digitRefs.rows[r][c] = [];
                for (var j = 0; j < 3; j++) {
                    var el = createDigitElement(false, false, false);
                    gWrap.appendChild(el);
                    digitRefs.rows[r][c].push(el.querySelector('.digit'));
                }
                rowEl.appendChild(gWrap);
            }
        }

        function flashStatus(type) {
            var dot = document.getElementById('status-dot');
            if (!dot) return;
            dot.className = ''; 
            if (type === 'local') dot.classList.add('dot-local');
            else if (type === 'cloud') dot.classList.add('dot-cloud');
            else if (type === 'error') dot.classList.add('dot-error');
            dot.classList.add('dot-active');
            setTimeout(function() { dot.classList.remove('dot-active'); }, 500);
        }

        function renderBoard(vals) {
            var b1 = (vals[0] || "").toString().padStart(2, ' ');
            var b2 = (vals[1] || "").toString().padStart(2, ' ');
            var now = new Date();
            var timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            var topStr = b1 + timeStr + b2;
            
            for(var i=0; i<topStr.length; i++) {
                // FIX: If it's a colon, we DON'T update the textContent. 
                // This lets the CSS animation run without being interrupted.
                if (digitRefs.top[i].isColon) continue; 
                
                if (digitRefs.top[i].dom.textContent !== topStr[i]) {
                    digitRefs.top[i].dom.textContent = topStr[i];
                }
            }

            for (var r = 0; r < ROWS.length; r++) {
                for (var c = 0; c < 3; c++) {
                    var labelText = ROWS[r][c][0];
                    var val = vals[ROWS[r][c][1]];
                    var lbl = document.getElementById('lbl-' + (r+1) + '-' + c);

                    if (labelText === "Wickets") {
                        if (!lbl.querySelector('#status-dot')) lbl.innerHTML = '<span id="status-dot"></span>' + labelText;
                    } else { 
                        if (lbl.textContent !== labelText) lbl.textContent = labelText; 
                    }

                    var active = (val !== null && val !== undefined && val.toString().trim() !== "");
                    lbl.className = active ? 'label' : 'label inactive';
                    
                    var valStr = (val || "").toString().slice(-3).padStart(3, ' ');
                    for (var j = 0; j < 3; j++) {
                        if (digitRefs.rows[r][c][j].textContent !== valStr[j]) {
                            digitRefs.rows[r][c][j].textContent = valStr[j];
                        }
                    }
                }
            }
        }

        function updateScore() {
            var url = isUsingLocal ? LOCAL_URL : NPOINT_URL;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url + '?t=' + Date.now(), true);
            xhr.timeout = 2000;
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var vals = JSON.parse(xhr.responseText);
                            renderBoard(vals);
                            flashStatus(isUsingLocal ? 'local' : 'cloud');
                        } catch (e) { flashStatus('error'); }
                    } else if (isUsingLocal) {
                        isUsingLocal = false;
                        switchInterval(CLOUD_SPEED);
                        updateScore();
                    }
                }
            };
            xhr.onerror = function() { 
                if (isUsingLocal) { isUsingLocal = false; switchInterval(CLOUD_SPEED); }
            };
            xhr.send();
        }

        function switchInterval(ms) {
            if (currentInterval !== ms) {
                currentInterval = ms;
                clearInterval(pollTimer);
                pollTimer = setInterval(updateScore, currentInterval);
            }
        }

        pollTimer = setInterval(updateScore, currentInterval);
        updateScore();

        document.getElementById('fs-btn').onclick = function() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if(rfs) rfs.call(el);
            this.style.display = 'none';
        };
    </script>
</body>
</html>

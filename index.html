<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @font-face { font-family: 'DSEG7'; src: url('DSEG7.ttf'); }
        body { background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; color: white; overflow: hidden; }
        
        .row-container { width: 700px; margin-bottom: 2vh; display: flex; flex-direction: column; }
        .digit-row { display: grid; grid-template-columns: repeat(11, 1fr); column-gap: 2px; }
        
        .top-row-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 2.5vh; }
        .batter-id-group, .clock-group { display: flex; align-items: center; gap: 0; }
        
        .cell, .top-digit-wrap, .clock-colon-wrap { position: relative; display: flex; justify-content: center; align-items: center; aspect-ratio: 1 / 1.5; }
        .top-digit-wrap { width: 3.8vh; }
        .clock-colon-wrap { width: 1.8vh; }
        .cell { width: 100%; }

        .dim, .bright { font-family: 'DSEG7', monospace; line-height: 1; position: absolute; }
        .dim { color: #180300; z-index: 1; }
        .bright { color: #ff5500; z-index: 2; text-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .digit-row .dim, .digit-row .bright { font-size: 8vh; }
        #row0 .dim, #row0 .bright { font-size: 5.33vh; }
        .clock-colon-wrap .bright, .clock-colon-wrap .dim { transform: translateY(-5%); }

        .label-row { display: grid; grid-template-columns: repeat(3, 1fr); column-gap: 2px; }
        .label { text-transform: uppercase; font-weight: bold; text-align: center; font-size: 5vh; color: white; padding: 0.5vh 0; transition: color 0.4s ease; }
        .label.inactive { color: #222; }
        
        #fs-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.1); color: #666; border: 1px solid #444; padding: 8px 12px; cursor: pointer; font-size: 12px; border-radius: 4px; z-index: 100; }

        @media (max-width: 767px) {
            .row-container { width: 96vw; }
            .digit-row .dim, .digit-row .bright { font-size: 8.5vw; }
            #row0 .dim, #row0 .bright { font-size: 6vw; }
            .label { font-size: 5.2vw; } 
            .top-digit-wrap { width: 4.5vw; }
            .clock-colon-wrap { width: 2.5vw; }
        }
    </style>
</head>
<body>
    <button id="fs-btn" onclick="document.documentElement.requestFullscreen()">FULLSCREEN</button>

    <div id="board"></div>

    <script>
        const NPOINT_ID = "e5ab2c288d26e7ce23ca"; 

        // Structure: [Display Name, Data Index for Large Number]
        const ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],     // Scores for B1, Total, B2
            [["1st Inns", 10], ["Wickets", 5], ["Overs", 6]],
            [["DLS Par", 13], ["To Win", 11], ["Overs Rem", 12]],
            [["Extras", 7],    ["Last Man", 8], ["Last Wkt", 9]]
        ];

        // Init HTML
        const board = document.getElementById('board');
        board.innerHTML = `<div class="row-container"><div id="row0" class="top-row-grid"></div></div>`;

        ROWS.forEach((rowConfigs, rowIndex) => {
            const rowNum = rowIndex + 1;
            const container = document.createElement('div');
            container.className = 'row-container';
            container.innerHTML = `
                <div class="label-row">
                    ${rowConfigs.map((cfg, col) => `<div id="lbl-${rowNum}-${col}" class="label">${cfg[0]}</div>`).join('')}
                </div>
                <div id="row${rowNum}" class="digit-row"></div>
            `;
            board.appendChild(container);
        });

        function createDigit(char, isColon = false, isTopRow = false) {
            const wrap = document.createElement('div');
            wrap.className = isTopRow ? (isColon ? 'clock-colon-wrap' : 'top-digit-wrap') : 'cell';
            wrap.innerHTML = `<div class="dim">${isColon ? ':' : '8'}</div>`;
            if (char && char !== " ") {
                const b = document.createElement('div');
                b.className = 'bright';
                b.textContent = char;
                wrap.appendChild(b);
            }
            return wrap;
        }

        async function updateScore() {
            try {
                const response = await fetch(`https://api.npoint.io/${NPOINT_ID}?t=${Date.now()}`);
                const vals = await response.json(); 
                if (!vals) return;

                // 1. TOP ROW: Hardcoded Batter IDs (0, 1) and Clock
                const r0 = document.getElementById('row0');
                r0.innerHTML = '';
                const timeStr = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
                
                // Batter IDs (Small numbers)
                const b1_id = (vals[0] ?? "").toString().padStart(2," ").slice(-2);
                const b2_id = (vals[1] ?? "").toString().padStart(2," ").slice(-2);

                const grp = (s, isT) => {
                    const d = document.createElement('div');
                    d.className = isT ? 'clock-group' : 'batter-id-group';
                    [...s].forEach(c => d.appendChild(createDigit(c, c === ':', true)));
                    return d;
                };
                r0.append(grp(b1_id), grp(timeStr, true), grp(b2_id));

                // 2. MAIN GRID (Rows 1-4)
                ROWS.forEach((rowConfigs, rowIndex) => {
                    const rowId = `row${rowIndex + 1}`;
                    const container = document.getElementById(rowId);
                    container.innerHTML = '';

                    rowConfigs.forEach(([name, dataIdx], colIndex) => {
                        const val = vals[dataIdx];
                        
                        // Set Label active state
                        const active = (val !== null && val !== undefined && val.toString().trim() !== "");
                        document.getElementById(`lbl-${rowIndex + 1}-${colIndex}`).classList.toggle('inactive', !active);

                        // Pad with spaces for cricket-style numbers
                        const str = (val ?? "").toString().padStart(3, " ").slice(-3);
                        [...str].forEach(char => container.appendChild(createDigit(char)));

                        if (colIndex < 2) container.appendChild(document.createElement('div')).className = 'cell';
                    });
                });
            } catch (e) { console.error(e); }
        }

        setInterval(updateScore, 3000);
        updateScore();
    </script>
</body>
</html>

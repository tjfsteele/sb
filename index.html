<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('DSEG7.ttf') format('truetype'); 
        }
        body { 
            background: black; 
            margin: 0; 
            padding: 0;
            font-family: Arial, sans-serif; 
            color: white; 
            overflow: hidden; 
            text-align: center;
        }

        /* Container that scales to the screen width */
        #board {
            width: 96vw;
            margin: 0 auto;
            padding-top: 2vh;
        }

        .row-container { 
            width: 100%; 
            margin-bottom: 4vh;
            clear: both;
        }

        /* Top Row Styling */
        .top-row-grid { 
            width: 100%;
            margin-bottom: 5vh;
            display: block;
            overflow: hidden;
        }
        .top-left { float: left; width: 30%; text-align: left; }
        .top-center { display: inline-block; width: 38%; text-align: center; }
        .top-right { float: right; width: 30%; text-align: right; }

        /* Digits and Backgrounds */
        .cell, .top-digit-wrap, .clock-colon-wrap { 
            position: relative; 
            display: inline-block; 
            vertical-align: middle;
            aspect-ratio: 1 / 1.5;
            width: 8vw; /* Scale to screen width */
            height: 12vw;
        }
        .top-digit-wrap { width: 4.5vw; height: 7vw; }
        .clock-colon-wrap { width: 2vw; height: 7vw; }

        .digit, .digit-bg { 
            font-family: 'DSEG7', monospace; 
            position: absolute; 
            left: 0; width: 100%; 
            line-height: 1.1;
        }
        .digit { color: #f00; z-index: 2; text-shadow: 0 0 5px rgba(255,0,0,0.5); font-size: 10vw; }
        .digit-bg { color: #200; z-index: 1; font-size: 10vw; }
        
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 6vw; }
        .clock-colon-wrap .digit { font-size: 5vw; top: -0.5vw; }

        /* Labels: Much larger for visibility */
        .label-row { width: 100%; margin-bottom: 0.5vh; display: block; overflow: hidden; }
        .label { 
            display: inline-block;
            text-transform: uppercase; 
            font-size: 2.8vw; 
            font-weight: bold; 
            color: #aaa; 
            width: 32%;
            text-align: center;
        }
        .label.inactive { color: #151515; }

        .digit-row { width: 100%; display: block; }
        .group-wrap { display: inline-block; width: 32%; text-align: center; }
        .spacer { display: inline-block; width: 1%; }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],
            [["Extras", 7],   ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10],["Last Man", 8],["Overs Rem", 12]],
            [["To Win", 11],  ["Last Wkt", 9],["DLS Par", 13]]
        ];

        function createDigit(char, isColon, isSmall) {
            var wrap = document.createElement('div');
            wrap.className = isColon ? 'clock-colon-wrap' : (isSmall ? 'top-digit-wrap' : 'cell');
            var bg = document.createElement('div');
            bg.className = 'digit-bg';
            bg.innerHTML = isColon ? ':' : '8';
            var fg = document.createElement('div');
            fg.className = 'digit';
            fg.innerHTML = char;
            wrap.appendChild(bg);
            wrap.appendChild(fg);
            return wrap;
        }

        // Setup the board structure
        var board = document.getElementById('board');
        var html = '<div class="row-container"><div id="row0" class="top-row-grid"></div></div>';
        for (var i = 0; i < ROWS.length; i++) {
            var rNum = i + 1;
            html += '<div class="row-container">' +
                        '<div class="label-row">' +
                            '<div id="lbl-' + rNum + '-0" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-1" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-2" class="label"></div>' +
                        '</div>' +
                        '<div id="row' + rNum + '" class="digit-row"></div>' +
                    '</div>';
        }
        board.innerHTML = html;

        function updateScore() {
            fetch('https://api.npoint.io/' + NPOINT_ID + '?t=' + Date.now())
                .then(function(res) { return res.json(); })
                .then(function(vals) {
                    if (!vals) return;

                    // 1. TOP ROW
                    var r0 = document.getElementById('row0');
                    r0.innerHTML = '';
                    var b1 = (vals[0] || "").toString().padStart(2, " ").split('');
                    var b2 = (vals[1] || "").toString().padStart(2, " ").split('');
                    var now = new Date();
                    var time = (now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0')).split('');

                    var lDiv = document.createElement('div'); lDiv.className = 'top-left';
                    for(var i=0; i<b1.length; i++) lDiv.appendChild(createDigit(b1[i], false, true));
                    
                    var cDiv = document.createElement('div'); cDiv.className = 'top-center';
                    for(var j=0; j<time.length; j++) cDiv.appendChild(createDigit(time[j], time[j]===':', true));
                    
                    var rDiv = document.createElement('div'); rDiv.className = 'top-right';
                    for(var k=0; k<b2.length; k++) rDiv.appendChild(createDigit(b2[k], false, true));

                    r0.appendChild(lDiv); r0.appendChild(cDiv); r0.appendChild(rDiv);

                    // 2. MAIN GRID
                    for (var r = 0; r < ROWS.length; r++) {
                        var rowId = 'row' + (r + 1);
                        var container = document.getElementById(rowId);
                        container.innerHTML = '';
                        var configSet = ROWS[r];

                        for (var c = 0; c < configSet.length; c++) {
                            var gWrap = document.createElement('div');
                            gWrap.className = 'group-wrap';
                            
                            var name = configSet[c][0];
                            var val = vals[configSet[c][1]];
                            
                            var lbl = document.getElementById('lbl-' + (r+1) + '-' + c);
                            lbl.innerHTML = name;
                            var active = (val !== null && val !== undefined && val.toString().trim() !== "");
                            lbl.className = active ? 'label' : 'label inactive';

                            var strChars = (val === null || val === undefined ? "" : val).toString().slice(-3).padStart(3, " ").split('');
                            for (var m = 0; m < strChars.length; m++) {
                                gWrap.appendChild(createDigit(strChars[m]));
                            }
                            container.appendChild(gWrap);
                            if (c < 2) {
                                var s = document.createElement('div');
                                s.className = 'spacer';
                                container.appendChild(s);
                            }
                        }
                    }
                })
                .catch(function(e) { console.error(e); });
        }

        setInterval(updateScore, 3000);
        updateScore();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cricket Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('DSEG7.ttf') format('truetype'); 
        }
        body { 
            background: black; 
            margin: 0; 
            padding: 0;
            font-family: Arial, sans-serif; 
            color: white; 
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #board {
            width: 1000px; /* Fixed width for consistent layout */
            margin-top: 20px;
        }

        .row-container { 
            width: 100%; 
            margin-bottom: 25px;
        }

        /* Top Row Layout */
        .top-row-grid { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        /* Digit Rows */
        .digit-row { 
            display: flex;
            width: 100%;
            justify-content: space-between;
        }

        .group-wrap {
            display: flex;
            justify-content: center;
            width: 32%;
        }

        .cell, .top-digit-wrap, .clock-colon-wrap { 
            position: relative; 
            display: inline-block;
            width: 55px;   
            height: 85px;  
            margin: 0 3px;
        }
        
        .top-digit-wrap { width: 35px; height: 50px; }
        .clock-colon-wrap { width: 20px; height: 50px; }

        .digit, .digit-bg { 
            font-family: 'DSEG7'; 
            position: absolute; 
            left: 0; 
            width: 100%; 
            text-align: center;
        }
        
        /* Large Red Digits */
        .digit { color: #f00; z-index: 2; font-size: 80px; line-height: 85px; text-shadow: 0 0 8px rgba(255,0,0,0.7); }
        .digit-bg { color: #211; z-index: 1; font-size: 80px; line-height: 85px; }
        
        .top-digit-wrap .digit, .top-digit-wrap .digit-bg { font-size: 45px; line-height: 50px; }
        .clock-colon-wrap .digit { font-size: 40px; line-height: 50px; top: -3px; }

        /* Labels - Large and Grey */
        .label-row { 
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 8px;
        }
        .label { 
            text-transform: uppercase; 
            font-size: 24px; 
            font-weight: bold; 
            color: #bbb; 
            width: 32%;
            text-align: center;
        }
        .label.inactive { color: #1a1a1a; }

        /* Mobile / Small Screen Scaling */
        @media (max-width: 1000px) {
            #board { transform: scale(0.9); transform-origin: top center; }
        }
        @media (max-width: 600px) {
            #board { transform: scale(0.4); transform-origin: top center; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var NPOINT_ID = "e5ab2c288d26e7ce23ca";
        var ROWS = [
            [["Batter", 2],   ["Total", 4],   ["Batter", 3]],
            [["Extras", 7],   ["Wickets", 5], ["Overs", 6]],
            [["1st Inns", 10],["Last Man", 8],["Overs Rem", 12]],
            [["To Win", 11],  ["Last Wkt", 9],["DLS Par", 13]]
        ];

        function createDigit(char, isColon, isSmall) {
            var wrap = document.createElement('div');
            wrap.className = isColon ? 'clock-colon-wrap' : (isSmall ? 'top-digit-wrap' : 'cell');
            var bg = document.createElement('div');
            bg.className = 'digit-bg';
            bg.innerHTML = isColon ? ':' : '8';
            var fg = document.createElement('div');
            fg.className = 'digit';
            fg.innerHTML = char;
            wrap.appendChild(bg);
            wrap.appendChild(fg);
            return wrap;
        }

        // Initialize Board structure
        var board = document.getElementById('board');
        var html = '<div class="row-container"><div id="row0" class="top-row-grid"></div></div>';
        for (var i = 0; i < ROWS.length; i++) {
            var rNum = i + 1;
            html += '<div class="row-container">' +
                        '<div class="label-row">' +
                            '<div id="lbl-' + rNum + '-0" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-1" class="label"></div>' +
                            '<div id="lbl-' + rNum + '-2" class="label"></div>' +
                        '</div>' +
                        '<div id="row' + rNum + '" class="digit-row"></div>' +
                    '</div>';
        }
        board.innerHTML = html;

        function updateScore() {
            fetch('https://api.npoint.io/' + NPOINT_ID + '?t=' + Date.now())
                .then(function(res) { return res.json(); })
                .then(function(vals) {
                    if (!vals) return;

                    // 1. TOP ROW (Batters IDs & Clock)
                    var r0 = document.getElementById('row0');
                    r0.innerHTML = '';
                    var b1 = (vals[0] || "").toString().padStart(2, " ").split('');
                    var b2 = (vals[1] || "").toString().padStart(2, " ").split('');
                    var now = new Date();
                    var timeStr = (now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0')).split('');

                    var group = function(arr, isClock) {
                        var d = document.createElement('div');
                        for(var k=0; k<arr.length; k++) d.appendChild(createDigit(arr[k], arr[k]===':', true));
                        return d;
                    };

                    r0.appendChild(group(b1, false));
                    r0.appendChild(group(timeStr, true));
                    r0.appendChild(group(b2, false));

                    // 2. MAIN GRID
                    for (var r = 0; r < ROWS.length; r++) {
                        var container = document.getElementById('row' + (r + 1));
                        container.innerHTML = '';
                        var rowData = ROWS[r];

                        for (var c = 0; c < rowData.length; c++) {
                            var gWrap = document.createElement('div');
                            gWrap.className = 'group-wrap';
                            
                            var labelText = rowData[c][0];
                            var value = vals[rowData[c][1]];
                            
                            var lbl = document.getElementById('lbl-' + (r+1) + '-' + c);
                            lbl.innerHTML = labelText;
                            
                            var isActive = (value !== null && value !== undefined && value.toString().trim() !== "");
                            lbl.className = isActive ? 'label' : 'label inactive';

                            var chars = (value === null || value === undefined ? "" : value).toString().slice(-3).padStart(3, " ").split('');
                            for (var m = 0; m < chars.length; m++) {
                                gWrap.appendChild(createDigit(chars[m]));
                            }
                            container.appendChild(gWrap);
                        }
                    }
                })
                .catch(function(err) { console.error('Error fetching score:', err); });
        }

        setInterval(updateScore, 3000);
        updateScore();
    </script>
</body>
</html>
